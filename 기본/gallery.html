<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Board</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/gallery.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">PARK HANA</h1>
      <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="gallery.html" class="active">GALLERY</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-title">
      <div class="container">
        <p>PHOTO ARCHIVE</p>
        <h2>Gallery Board</h2>
        <span>사진을 카드형 게시판으로 보여주는 GitHub Pages용 정적 갤러리입니다.</span>
      </div>
    </section>

    <section class="gallery-board">
      <div class="container">
        <div class="filter-buttons">
          <button type="button" class="active" data-filter="all">전체</button>
          <button type="button" data-filter="education">타이포그래피</button>
          <button type="button" data-filter="community">일러스트레이션</button>
          <button type="button" data-filter="politics">브랜딩</button>
          <button type="button" data-filter="event">캘리그래피</button>
        </div>

        <div id="galleryList" class="gallery-list"></div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <button type="button" id="modalClose" class="modal-close">×</button>
    <div class="modal-content">
      <img id="modalImage" src="" alt="">
      <div class="modal-text">
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
      </div>
    </div>
  </div>

  <script src="js/gallery-data.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
